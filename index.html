<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>今天吃什么？ | 挑选随机美食</title>
    <meta
      name="description"
      content="输入地点，根据高德地图随机挑选附近美食。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="tab-panel is-active" id="tools" aria-labelledby="tools-title">
        <div class="tools-head shell">
          <div>
            <p class="mini-label">TINY TOOLBOX</p>
            <h1 id="tools-title">
              今天
              <span class="marker marker-yellow tilt-left">吃什么？</span>
            </h1>
            <p class="lead">
              随便帮你选一家吃的
              <br />
              你去炫吧
            </p>
          </div>
          <div class="food-status-card">
            <span>STATUS</span>
            <strong>高德地图已配置</strong>
            <ol class="status-note-list">
              <li>商家与距离来自高德地图。</li>
              <li>点击卡片会只用店名跳转到大众点评搜索页。</li>
              <li>定位按钮会打开高德地图导航。</li>
            </ol>
          </div>
        </div>

        <section class="food-tool shell" aria-label="随机美食小功能">
          <div class="food-control-panel">
            <label class="food-search-box">
              <span>地点</span>
              <div class="place-input-row">
                <input type="search" data-food-place placeholder="输入你想搜索的位置，例如：深圳南山区" />
                <button class="locate-button locate-search-button" type="button" data-food-resolve hidden>搜索定位</button>
                <button class="locate-button" type="button" data-food-locate>实时定位</button>
              </div>
            </label>

            <div class="food-middle-row">
              <div class="food-filter-stack">
                <div class="filter-group" aria-label="美食分类筛选">
                  <span>分类</span>
                  <div class="segmented-control" data-food-category>
                    <button class="is-selected" type="button" data-value="all">全部</button>
                    <button type="button" data-value="meal">正餐</button>
                    <button type="button" data-value="dessert">甜品</button>
                    <button type="button" data-value="drink">奶茶咖啡</button>
                  </div>
                </div>

                <div class="filter-group" aria-label="距离筛选">
                  <span>距离</span>
                  <div class="segmented-control distance-control" data-food-distance>
                    <button class="is-selected" type="button" data-value="nearby">附近</button>
                    <button type="button" data-value="500">500米</button>
                    <button type="button" data-value="1000">1km</button>
                    <button type="button" data-value="2000">2km</button>
                  </div>
                </div>
              </div>

              <section class="feedback-card" aria-label="优化反馈">
                <strong>优化反馈</strong>
                <p>有想法？点这里写反馈。</p>
                <a class="feedback-link-button" href="https://docs.qq.com/smartsheet/form/LUlpBnpAPGbc%2FtCTK6c%2FvuwKFj?tab=tCTK6c" target="_blank" rel="noreferrer">
                  填写反馈
                </a>
              </section>
            </div>

            <div class="food-actions">
              <button class="comic-button food-search-button" type="button" data-food-search>
                <span class="button-icon">⌕</span>
                <span data-food-search-label>搜索附近美食</span>
              </button>
              <button class="comic-button food-random-button" type="button" data-food-random disabled>
                <span class="button-icon">?</span>
                随机挑选吃什么
              </button>
            </div>
          </div>

          <div class="food-results-head">
            <h2 class="stamp-title">附近美食</h2>
            <p data-food-count>还没有搜索结果</p>
          </div>
          <div class="food-card-grid" data-food-results>
            <article class="food-empty-card">
              <strong>先输入地点</strong>
              <p>默认不自动搜索。输入地点后，就能按当前分类和距离展示真实周边美食。</p>
            </article>
          </div>
        </section>
      </section>
    </main>

    <div class="food-overlay" data-food-overlay hidden>
      <section class="food-pop-card" aria-label="随机美食结果">
        <button class="modal-close-button" type="button" data-overlay-close aria-label="关闭">×</button>
        <span class="contact-badge">PICKED</span>
        <h2>今天就吃这个</h2>
        <div data-food-picked></div>
        <button class="comic-button food-again-button" type="button" data-food-random-again>
          <span class="button-icon">↻</span>
          继续随机
        </button>
        <p>点击卡片外任意位置关闭</p>
      </section>
    </div>

    <div class="floating-food-actions" data-food-float hidden>
      <button class="floating-food-button" type="button" data-food-floating-random disabled>随机选择</button>
      <button class="floating-food-button" type="button" data-food-back-top>返回顶部</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
